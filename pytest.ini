[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, mocked dependencies)
    integration: Integration tests (real/mocked external services)
    benchmark: Long-running evaluation benchmarks
    slow: Slow tests (>1s)
addopts =
    -v
    --strict-markers
    --tb=short
